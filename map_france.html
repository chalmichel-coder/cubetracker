const DIAG = {"file": "C:\\CubeTracker\\data\\WCA_export_competitions.tsv", "columns": ["id", "name", "information", "external_website", "venue", "city_name", "country_id", "venue_address", "venue_details", "cell_name", "cancelled", "event_specs", "delegates", "organizers", "year", "month", "day", "end_year", "end_month", "end_day", "latitude_microdegrees", "longitude_microdegrees"], "total_rows": 17587, "france_country_rows": 383, "france_coord_fallback_rows": 0, "with_coordinates": 17587, "kept": 383, "skipped_no_country_or_not_france": 17204, "skipped_no_coordinates": 0, "skipped_no_date": 0};
let activeFilter = 'all';
let searchQuery = '';
let markers = [];

const map = L.map('map').setView([46.8, 2.4], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:18 }).addTo(map);

function color(c){ return c.status==='future' ? '#ff9f1c' : c.status==='ongoing' ? '#06d6a0' : '#4361ee'; }
function makeIcon(c){
  const size = c.status==='past' ? 13 : 16;
  return L.divIcon({className:'',html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color(c)};border:2px solid white;box-shadow:0 2px 7px rgba(0,0,0,.35)"></div>`,iconSize:[size,size],iconAnchor:[size/2,size/2]});
}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function getFiltered(includeOutside=false){
  return COMPS.filter(c=>{
    if(!includeOutside && !c.mainland) return false;
    if(activeFilter!=='all' && c.status!==activeFilter) return false;
    const hay = `${c.name} ${c.city} ${c.venue} ${c.address} ${c.id}`.toLowerCase();
    if(searchQuery && !hay.includes(searchQuery)) return false;
    return true;
  });
}
function setFilter(f){activeFilter=f;['all','future','ongoing','past'].forEach(id=>document.getElementById('btn-'+id).classList.toggle('on',id===f));render();}
function setSearch(v){searchQuery=String(v||'').toLowerCase().trim();render();}
function renderMarkers(rows){
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  rows.forEach(c=>{
    const m = L.marker([c.lat,c.lon],{icon:makeIcon(c)});
    m.bindPopup(`<div class="popup-name">${esc(c.name)}</div><div class="popup-city">${esc(c.city||'Ville non renseignée')}${c.venue?' · '+esc(c.venue):''}</div><div class="popup-date">${c.start}${c.end&&c.end!==c.start?' → '+c.end:''}</div><span class="badge ${c.status}">${c.status_label}</span><div style="margin-top:8px"><a href="${c.url}" target="_blank">Voir sur WCA →</a></div>`);
    m.addTo(map); markers.push(m);
  });
}
function rowHtml(c){return `<div class="row"><div class="date">${c.start}</div><div><div class="name">${esc(c.name)}</div><div class="city">${esc(c.city||'Ville non renseignée')}${c.venue?' · '+esc(c.venue):''}</div><span class="badge ${c.status}">${c.status_label}</span></div><a class="wca" target="_blank" href="${c.url}">WCA</a></div>`;}
function renderList(allRows){
  const mainlandRows = allRows.filter(c=>c.mainland).slice(0,250);
  const outsideRows = allRows.filter(c=>!c.mainland).slice(0,60);
  document.getElementById('list').innerHTML = mainlandRows.length ? mainlandRows.map(rowHtml).join('') : '<p class="muted">Aucune compétition sur la carte pour ce filtre.</p>';
  document.getElementById('outside').innerHTML = outsideRows.length ? `<div class="section-title">Hors métropole / Corse</div><p class="muted">2 compétition(s) française(s) hors carte principale sont listées séparément.</p>${outsideRows.map(rowHtml).join('')}` : '';
}
function render(){
  const visibleMarkers = getFiltered(false);
  const allRows = COMPS.filter(c=>{
    if(activeFilter!=='all' && c.status!==activeFilter) return false;
    const hay = `${c.name} ${c.city} ${c.venue} ${c.address} ${c.id}`.toLowerCase();
    if(searchQuery && !hay.includes(searchQuery)) return false;
    return true;
  });
  renderMarkers(visibleMarkers);
  renderList(allRows);
  document.getElementById('count').textContent = allRows.length + ' compétition' + (allRows.length>1?'s':'');
  if(markers.length){
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.12));
    if(map.getZoom()>7) map.setZoom(7);
  } else { map.setView([46.8,2.4],6); }
}
window.CubeTrackerMap = { setFilter, setSearch };
window.addEventListener('message', function(event){
  const data = event.data || {};
  if(data.type === 'cubetracker-map-filter') setFilter(data.value || data.filter || 'all');
  if(data.type === 'cubetracker-map-search'){
    const v = data.value || data.query || '';
    const input = document.getElementById('search');
    if(input) input.value = v;
    setSearch(v);
  }
});
render();
if(COMPS.length===0){ document.getElementById('diag').style.display='block'; document.getElementById('diag').textContent=JSON.stringify(DIAG,null,2); }
</script>
